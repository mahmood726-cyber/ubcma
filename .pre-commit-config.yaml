# Pre-commit hooks — runs locally before each `git commit`.
# Install once per clone:
#   pip install pre-commit && pre-commit install
#
# Matches the rule selection used in CI (.github/workflows/ci.yml) and
# in the project's ruff config (pyproject.toml / ruff.toml).
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]
