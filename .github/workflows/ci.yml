# Minimal CI: lint with ruff, run pytest. Best-effort — failures
# do not block merges by default. Promote to required check via the
# branch-protection UI once the repo is consistently green.
name: ci
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install --quiet ruff
      - name: Ruff check (informational)
        # `--exit-zero` keeps this informational while the codebase
        # still has known lint debt; flip to `--exit-non-zero-on-fix`
        # once that debt is paid down.
        run: ruff check --exit-zero --output-format=github .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install --quiet pytest pytest-cov
          if [ -f requirements.txt ]; then pip install --quiet -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install --quiet -e . || true; fi
      - name: Pytest with coverage
        run: |
          pytest -q --tb=short --cov=. --cov-report=xml --cov-report=term-missing || echo "::warning::pytest exited non-zero (see logs)"
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14
