# GitHub CodeQL — free static security analysis from GitHub.
# Complements ruff (style) and pip-audit (deps) by finding real
# security issues in code: SQL injection, command injection, hardcoded
# secrets, unsafe deserialization, XSS in JS, etc.
name: codeql
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 7 * * 1"   # weekly Monday 07:00 UTC

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["python"]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{{{ matrix.language }}}}
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{{{ matrix.language }}}}"
